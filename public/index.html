<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Today I Learned | Learning Tracker</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header>
      <div class="title-header">
        <img class="logo-img" src="./images/book.png" alt="site logo" />
        <div class="title">
          <h3 class="site-title">Today I Learned</h3>
          <p class="sub-title">Track your coding journey.</p>
        </div>
      </div>

      <a href="new-learning.html" class="add-btn btn">
        <i class="fa-solid fa-plus"></i>
        Add New Learning
      </a>
    </header>

    <main>
      <div class="filter-sort">
        <input type="text" id="search" class="search-filter" placeholder="Search by topic, category, or description...." />
        <select id="category-filter" class="category-filter">
          <option value="all">All Categories</option>
          <option value="html">HTML</option>
          <option value="css">CSS</option>
          <option value="javascript">JavaScript</option>
          <option value="node">Node</option>
          <option value="react">React</option>
          <option value="git & github">Git & Github</option>
          <option value="backend">Backend</option>
          <option value="frontend">Frontend</option>
          <option value="ui/ux">UI/UX</option>
          <option value="debugging">Debugging</option>
        </select>
        <select id="sort" class="sort">
          <option value="default">Default</option>
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="favorites">Favorites First</option>
          <option value="az">A → Z</option>
          <option value="za">Z → A</option>
        </select>
      </div>

      <div class="count">
        <p class="results-count"></p>
      </div>

      <div class="cards-container" id="cards-container"></div>
    </main>

    <footer>
      <p>&copy; 2026 Alishba. All rights reserved.</p>
    </footer>

    <script type="module" src="index.js"></script>
  </body>
</html>
